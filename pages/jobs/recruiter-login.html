<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Recruiter login for Path4Career Job Portal">
    <title>Recruiter Login - Path4Career</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/navbar.css">
    <link rel="stylesheet" href="../../assets/css/jobs.css">
    <style>
        .jobs-toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; background: var(--surface); color: var(--text-main); padding: 1rem 1.5rem; border-radius: var(--radius-md); box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 0.75rem; transform: translateX(110%); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-left: 4px solid var(--success); }
        .jobs-toast-error { border-left-color: var(--error); }
        .jobs-toast-show { transform: translateX(0); }

        .login-page { min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .login-card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px;
            padding: 3rem; width: 100%; max-width: 440px; box-shadow: var(--shadow-lg);
        }
        .login-card h2 { color: var(--text-main); font-size: 1.75rem; margin-bottom: 0.5rem; text-align: center; }
        .login-card p { color: var(--text-secondary); text-align: center; margin-bottom: 2rem; }
        .login-card .form-group { margin-bottom: 1.25rem; }
        .login-card label { display: block; color: var(--text-main); font-weight: 500; margin-bottom: 0.5rem; font-size: 0.95rem; }
        .login-card input {
            width: 100%; padding: 0.8rem 1rem; background: var(--bg-main); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text-main); font-size: 0.95rem; outline: none; transition: border-color 0.2s;
        }
        .login-card input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(74, 108, 247, 0.1); }
        .login-card .btn { width: 100%; padding: 0.9rem; font-size: 1rem; margin-top: 0.5rem; }
        .login-divider { text-align: center; margin: 1.5rem 0; color: var(--text-muted); font-size: 0.9rem; }
        .register-link { text-align: center; margin-top: 1rem; }
        .register-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .register-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div id="navbar-root"></div>

    <div class="login-page">
        <div class="login-card">
            <h2>👔 Recruiter Portal</h2>
            <p>Sign in to manage your job postings and applicants</p>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" required placeholder="recruiter@company.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" required placeholder="Your password">
                </div>
                <button type="submit" class="btn btn-primary" id="loginBtn">Sign In →</button>
            </form>

            <div class="login-divider">— or —</div>

            <div class="register-link">
                <p style="color: var(--text-muted); margin-bottom: 0.5rem;">Don't have an account?</p>
                <a href="../auth/register.html">Register as Recruiter</a>
            </div>

            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="jobs-listing.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">← Back to Jobs</a>
            </div>
        </div>
    </div>

    <script src="../../assets/js/navbar.js"></script>
    <script src="../../assets/js/jobs-api.js"></script>
    <script>
        // Check if already logged in
        document.addEventListener('DOMContentLoaded', async () => {
            const auth = await JobsAPI.checkAuth();
            if (auth && auth.loggedIn) {
                window.location.href = 'recruiter-dashboard.html';
                return;
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            if (!email || !password) {
                JobsAPI.showToast('Please fill in all fields', 'error');
                return;
            }

            const loginBtn = document.getElementById('loginBtn');
            loginBtn.textContent = 'Signing in...';
            loginBtn.disabled = true;

            try {
                const res = await fetch('https://path4career-backend.onrender.com/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (!res.ok) {
                    const err = await res.text();
                    throw new Error(err || 'Login failed');
                }

                const token = await res.text();
                localStorage.setItem('AUTH_TOKEN', token);
                localStorage.setItem('recruiter_email', email);

                JobsAPI.showToast('Login successful!');
                setTimeout(() => {
                    window.location.href = 'recruiter-dashboard.html';
                }, 500);
            } catch (err) {
                JobsAPI.showToast(err.message || 'Login failed', 'error');
                loginBtn.textContent = 'Sign In →';
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
