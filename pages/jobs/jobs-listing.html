<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse and search for jobs on Path4Career. Find your next career opportunity.">
    <title>Jobs - Path4Career</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/navbar.css">
    <link rel="stylesheet" href="../../assets/css/jobs.css">
    <style>
        /* Toast styles for jobs pages */
        .jobs-toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            background: var(--surface);
            color: var(--text-main);
            padding: 1rem 1.5rem;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transform: translateX(110%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-left: 4px solid var(--success);
        }
        .jobs-toast-error { border-left-color: var(--error); }
        .jobs-toast-show { transform: translateX(0); }
        .jobs-toast-icon { font-size: 1.25rem; }

        /* Page spacing for navbar */
        .jobs-page-wrapper { padding-top: 10px; }
        .jobs-page-wrapper .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }

        /* Pagination */
        .pagination { display: flex; justify-content: center; gap: 0.5rem; margin-top: 2rem; }
        .pagination button {
            background: var(--surface); border: 1px solid var(--border); color: var(--text-main);
            padding: 0.5rem 1rem; border-radius: var(--radius-md); cursor: pointer; transition: var(--transition);
        }
        .pagination button.active, .pagination button:hover {
            background: var(--primary); color: white; border-color: var(--primary);
        }
        .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Loading spinner */
        .loading-spinner {
            text-align: center; padding: 3rem; color: var(--text-muted);
            grid-column: 1 / -1;
        }
        .loading-spinner::after {
            content: ''; display: block; width: 40px; height: 40px;
            margin: 1rem auto; border: 3px solid var(--border);
            border-top-color: var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body>
    <div id="navbar-root"></div>

    <div class="jobs-page-wrapper">
        <!-- Hero Section -->
        <div class="container">
            <div class="hero-jobs-page hero-modern">
                <h2>Find Your Dream Job</h2>
                <p>Discover thousands of opportunities from top companies worldwide.</p>

                <!-- Search Bar -->
                <div class="search-container-modern" id="searchContainer">
                    <div class="search-input-wrapper">
                        <i>🔍</i>
                        <input type="text" class="search-input-modern" id="searchInput" placeholder="Job title, company, or keyword...">
                    </div>
                    <div class="search-input-wrapper">
                        <i>📍</i>
                        <select class="search-input-modern" id="locationFilter">
                            <option value="">All Locations</option>
                        </select>
                    </div>
                    <div class="search-input-wrapper">
                        <i>💼</i>
                        <select class="search-input-modern" id="typeFilter">
                            <option value="">All Job Types</option>
                            <option value="Full-time">Full-time</option>
                            <option value="Part-time">Part-time</option>
                            <option value="Contract">Contract</option>
                            <option value="Internship">Internship</option>
                            <option value="Remote">Remote</option>
                        </select>
                    </div>
                    <button class="btn-search-modern" id="searchBtn">🔍 Search</button>
                </div>
            </div>
        </div>

        <!-- Filter Chips -->
        <div class="container">
            <div id="filterChips" class="filter-chips-container" style="margin-bottom: 1rem;"></div>
        </div>

        <!-- Job Header -->
        <div class="container">
            <div class="job-container">
                <div class="job-list-header">
                    <h3 id="jobCount">Loading jobs...</h3>
                    <div style="display: flex; gap: 1rem; align-items: center;">
                        <a href="my-applications.html" class="btn btn-outline" style="text-decoration:none;">📋 My Applications</a>
                        <a href="recruiter-login.html" class="btn btn-outline" id="recruiterPortalBtn" style="text-decoration:none; display:none;">👔 Recruiter Portal</a>
                    </div>
                </div>

                <!-- Job Board -->
                <div class="job-board" id="jobBoard">
                    <div class="loading-spinner">Loading jobs...</div>
                </div>

                <!-- Pagination -->
                <div class="pagination" id="pagination"></div>
            </div>
        </div>

        <!-- Job Details Modal -->
        <div class="modal" id="jobModal">
            <div class="modal-content">
                <button class="close-btn" id="modalClose">&times;</button>
                <div class="modal-header">
                    <div class="modal-title-area">
                        <h2 id="modalTitle"></h2>
                        <p class="modal-company-name" id="modalCompany"></p>
                        <div class="job-card-tags" id="modalTags"></div>
                    </div>
                </div>
                <div class="modal-body-content">
                    <div class="modal-section">
                        <h4>Job Description</h4>
                        <p id="modalDescription"></p>
                    </div>
                    <div class="modal-section">
                        <h4>Details</h4>
                        <div id="modalDetails" style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-outline" onclick="document.getElementById('jobModal').classList.remove('show')" style="margin-right: 0.5rem;">Close</button>
                    <a id="modalApplyBtn" href="#" class="btn btn-primary" style="text-decoration:none;">View Full Details →</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Global Footer -->
    <div id="footer-root"></div>

    <script src="../../assets/js/navbar.js"></script>
    <script src="../../assets/js/jobs-api.js"></script>
    <script src="../../assets/js/jobs-listing.js"></script>
</body>
</html>
