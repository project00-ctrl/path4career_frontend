<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live C Editor - CareerPath</title>
    <link rel="stylesheet" href="../../assets/css/editor.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/jscpp@2.0.8/dist/JSCPP.es5.min.js"></script>
</head>

<body>

    <div id="navbar-root"></div>

    <div class="workspace">
        <div class="editor-pane">
            <p class="pane-label">
                <span>main.c</span>
                <span class="status-text">JSCPP Engine (Serverless)</span>
            </p>
            <textarea id="cInput" spellcheck="false" aria-label="C Input"></textarea>
        </div>

        <div class="result-pane">
            <p class="pane-label">Terminal Output</p>
            <div id="consoleDiv">
                <span class="log-system">✔ In-Browser C Engine Ready. Click "Compile & Run".</span>
            </div>
        </div>
    </div>

    <div id="inputModal" class="modal-overlay">
        <div class="modal-content">
            <h3><span style="color: #00ffb3;">⚡</span> Console Input Required</h3>
            <p>Your code uses <code>scanf</code> to request input. Please provide the values below <strong>(separated by spaces or new lines)</strong> before running.</p>
            <textarea id="modalStdin" placeholder="Enter inputs here..."></textarea>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-confirm" onclick="confirmAndRun()">▶ Continue Execution</button>
            </div>
        </div>
    </div>

    <script>
const cInput = document.getElementById('cInput');
        const consoleDiv = document.getElementById('consoleDiv');
        const runBtn = document.getElementById('runBtn');

        const inputModal = document.getElementById('inputModal');
        const modalStdin = document.getElementById('modalStdin');

        // 1. Fetch saved code or use default C template
        const savedCode = localStorage.getItem('careerPathCCode');
        const defaultCode = `#include <stdio.h>

int main() {
    printf("Hello from the serverless C engine! 🚀\\n");
    
    int a = 15;
    int b = 25;
    printf("The sum of %d and %d is: %d\\n", a, b, a + b);
    
    // A quick loop test
    for (int i = 1; i <= 3; i++) {
        printf("Processing cycle %d...\\n", i);
    }
    
    return 0;
}`;

        cInput.value = savedCode ? savedCode : defaultCode;

        // 2. Smart Indentation Engine (Upgraded for C '{' Brackets)
        cInput.addEventListener('keydown', function (e) {

            // Handle the 'Tab' Key
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = this.selectionStart;
                const end = this.selectionEnd;
                const spaces = "    "; // 4 spaces

                this.value = this.value.substring(0, start) + spaces + this.value.substring(end);
                this.selectionStart = this.selectionEnd = start + spaces.length;
                this.dispatchEvent(new Event('input'));
            }

            // Handle the 'Enter' Key
            if (e.key === 'Enter') {
                e.preventDefault();

                const start = this.selectionStart;
                const end = this.selectionEnd;

                const textBeforeCursor = this.value.substring(0, start);
                const lines = textBeforeCursor.split(/\r?\n/);
                const currentLine = lines[lines.length - 1] || "";

                const leadingSpacesMatch = currentLine.match(/^(\s*)/);
                let indentSpaces = leadingSpacesMatch ? leadingSpacesMatch[1] : '';

                // MAGIC: If the line ends with an opening bracket '{', add 4 MORE spaces!
                if (currentLine.trim().endsWith('{')) {
                    indentSpaces += "    ";
                }

                const insertText = "\n" + indentSpaces;

                this.value = this.value.substring(0, start) + insertText + this.value.substring(end);
                this.selectionStart = this.selectionEnd = start + insertText.length;
                this.dispatchEvent(new Event('input'));
            }
        });

        // 3. Auto-Save
        cInput.addEventListener('input', () => {
            localStorage.setItem('careerPathCCode', cInput.value);
        });

        function appendToConsole(text, className) {
            const span = document.createElement('span');
            span.className = className;
            span.textContent = text;
            consoleDiv.appendChild(span);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }

        // 4. Smart Execution Flow (Detects if Modal is needed)
        function handleRunClick() {
            const code = cInput.value.trim();
            if (!code) {
                consoleDiv.innerHTML = '<span class="log-error">Please enter some C code.</span>';
                return;
            }

            // Detect 'scanf'
            if (/\bscanf\s*\(/.test(code)) {
                inputModal.style.display = 'flex';
                modalStdin.value = localStorage.getItem('careerPathCStdin') || '';
                modalStdin.focus();
            } else {
                executeCCode("");
            }
        }

        function closeModal() {
            inputModal.style.display = 'none';
        }

        function confirmAndRun() {
            inputModal.style.display = 'none';
            const stdinData = modalStdin.value;
            localStorage.setItem('careerPathCStdin', stdinData);
            executeCCode(stdinData);
        }

        // 5. The Engine: JSCPP Execution (Serverless — No API calls!)
        function executeCCode(stdinString) {
            const code = cInput.value.trim();
            consoleDiv.innerHTML = '<span class="log-loading">>>> Compiling C...</span>\n';
            runBtn.disabled = true;

            // Configure the JSCPP Interpreter
            const config = {
                stdio: {
                    write: function(s) {
                        appendToConsole(s, 'log-normal');
                    }
                }
            };

            // Small delay to allow UI to update to "Compiling..." before freezing for compilation
            setTimeout(() => {
                try {
                    // JSCPP takes the code, the input string (for scanf), and config
                    JSCPP.run(code, stdinString, config);
                    appendToConsole('\n\n--- Execution Finished ---', 'log-system');
                } catch (err) {
                    // Clean up internal JSCPP error traces for students
                    let cleanError = err.message || err.toString();
                    appendToConsole('\nCompilation/Runtime Error:\n' + cleanError, 'log-error');
                } finally {
                    runBtn.disabled = false;
                }
            }, 50);
        }
</script>
<script src="../../assets/js/navbar.js"></script>
</body>

</html>
