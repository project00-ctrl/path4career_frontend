<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Excel Editor - Path4Career</title>

<link rel="stylesheet" href="../../assets/css/editor.css">

<style>
body { font-family: 'Inter', sans-serif; margin: 0; background-color: #f8fafc; }
.excel-workspace { padding: 20px; }

.spreadsheet-container {
overflow: auto;
max-height: 65vh;
border: 1px solid #cbd5e1;
background: #fff;
border-radius: 8px;
box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
}

.spreadsheet {
display: grid;
grid-template-columns: 50px repeat(10, 120px);
background-color: #e2e8f0;
gap: 1px;
}

.cell-header {
background: #f1f5f9;
padding: 8px;
text-align: center;
font-weight: 700;
font-size: 12px;
color: #475569;
user-select: none;
position: sticky;
top: 0;
z-index: 2;
}

.row-header { position: sticky; left: 0; z-index: 2; }
.corner-header { z-index: 3; }

.cell { background: white; height: 32px; display: flex; align-items: center; }
.cell-input {
width: 100%;
height: 100%;
border: none;
padding: 0 10px;
font-size: 13px;
outline: none;
background: transparent;
}

.cell-input:focus {
box-shadow: inset 0 0 0 2px #10b981;
background: #f0fdf4;
z-index: 10;
}

.bottom-panel { display: flex; gap: 20px; margin-top: 20px; }

.results-pane, .help-panel {
flex: 1;
background: white;
padding: 20px;
border-radius: 12px;
border: 1px solid #e2e8f0;
}

#logEntries {
height: 120px;
overflow-y: auto;
font-family: monospace;
font-size: 12px;
}

.log-success { color: #059669; }
.log-info { color: #3b82f6; }

h4 { margin-top: 0; }
</style>
</head>

<body>

<nav class="editor-nav">
<div class="logo-area">
<img class="logo-icon" src="../../assets/images/path4career-icon.png" alt="Path4Career" style="width:32px;height:32px;border-radius:8px;">
<div class="logo-text">Path4Career</div>
<div class="title-badge">📊 Excel Workspace</div>
</div>
<button class="run-btn" onclick="calculateAll()">▶ Calculate Sheet</button>
</nav>

<div class="excel-workspace">

<div class="formula-bar">
<div class="formula-label" id="selectedCell">A1</div>
<input type="text" id="formulaInput"/>
</div>

<div class="spreadsheet-container">
<div class="spreadsheet" id="spreadsheet"></div>
</div>

<div class="bottom-panel">

<div class="results-pane">
<h4>Calculation Log</h4>
<div id="logEntries"></div>
</div>

<div class="help-panel">
<h4>Supported Functions</h4>
<p>SUM / AVERAGE / MIN / MAX</p>
<p>IF / AND / OR / NOT</p>
<p>COUNT / COUNTA</p>
<p>POWER / SQRT / ROUND / ABS</p>
<p>UPPER / LOWER / LEN / TRIM / CONCATENATE</p>
</div>

</div>
</div>

<script>

const ROWS = 25;
const COLS = 10;
const COL_LABELS = ['A','B','C','D','E','F','G','H','I','J'];

let cellData = {};
let selectedCell = 'A1';

const spreadsheet = document.getElementById('spreadsheet');
const formulaInput = document.getElementById('formulaInput');
const selectedCellLabel = document.getElementById('selectedCell');
const logEntries = document.getElementById('logEntries');

function initSpreadsheet() {
    spreadsheet.innerHTML='';
    const corner=document.createElement('div');
    corner.className='cell-header corner-header';
    spreadsheet.appendChild(corner);

    for(let c=0;c<COLS;c++){
        const header=document.createElement('div');
        header.className='cell-header';
        header.textContent=COL_LABELS[c];
        spreadsheet.appendChild(header);
    }

    for(let r=1;r<=ROWS;r++){
        const rowHeader=document.createElement('div');
        rowHeader.className='cell-header row-header';
        rowHeader.textContent=r;
        spreadsheet.appendChild(rowHeader);

        for(let c=0;c<COLS;c++){
            const id=`${COL_LABELS[c]}${r}`;
            const cell=document.createElement('div');
            cell.className='cell';

            const input=document.createElement('input');
            input.className='cell-input';
            input.dataset.cell=id;

            input.addEventListener('focus',handleFocus);
            input.addEventListener('blur',handleBlur);
            input.addEventListener('keydown', handleKeydown);

            cell.appendChild(input);
            spreadsheet.appendChild(cell);
        }
    }
}

function handleFocus(e){
    selectedCell=e.target.dataset.cell;
    selectedCellLabel.textContent=selectedCell;
    formulaInput.value=cellData[selectedCell]?.formula || '';
}

function handleBlur(e){
    const id=e.target.dataset.cell;
    const val=e.target.value.trim();

    if(!cellData[id]) cellData[id]={};
    cellData[id].formula=val;

    calculateAll();
    save();
}

function handleKeydown(e) {
    if (e.key === 'Enter') {
        e.target.blur();
        const row = parseInt(selectedCell.substring(1));
        const nextId = `${selectedCell.charAt(0)}${row + 1}`;
        const nextInput = document.querySelector(`[data-cell="${nextId}"]`);
        if (nextInput) nextInput.focus();
    }
}

// 2-Way Binding for Formula Bar
formulaInput.addEventListener('input', (e) => {
    const activeCell = document.querySelector(`.cell-input[data-cell="${selectedCell}"]`);
    if (activeCell) activeCell.value = e.target.value;
});
formulaInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        const activeCell = document.querySelector(`.cell-input[data-cell="${selectedCell}"]`);
        if (activeCell) activeCell.blur();
    }
});

function calculateAll(){
    logEntries.innerHTML='';

    // 5 passes to resolve complex nested dependencies (A1 -> B1 -> C1)
    for(let pass=0;pass<5;pass++){
        for(const id in cellData){
            const entry=cellData[id];
            
            if(!entry.formula){
                entry.value='';
                continue;
            }

            if(entry.formula.startsWith('=')){
                entry.value=evaluateFormula(entry.formula);
            } else {
                const num=parseFloat(entry.formula);
                entry.value=isNaN(num) ? entry.formula : num;
            }
        }
    }

    // Refresh UI
    document.querySelectorAll('.cell-input').forEach(input=>{
        const id=input.dataset.cell;
        if(document.activeElement!==input){
            input.value=cellData[id]?.value ?? '';
        }
    });

    addLog("Sheet calculated successfully", "log-success");
}

function evaluateFormula(expr){
    try {
        expr = expr.substring(1); // Remove '='

        // 1. Extract strings to protect them from regex modification (e.g., "Yes")
        let strings = [];
        expr = expr.replace(/"[^"]*"/g, (match) => {
            strings.push(match);
            return `__STR${strings.length - 1}__`;
        });

        // Convert functions and cell references to uppercase safely
        expr = expr.toUpperCase();

        // 2. Transpile Ranges (A1:B2) into arrays
        expr = expr.replace(/([A-Z]\d+):([A-Z]\d+)/g, (match) => {
            const vals = getRangeValues(match);
            return '[' + vals.map(v => typeof v === 'string' ? `"${v}"` : (v===undefined||v==="" ? 0 : v)).join(',') + ']';
        });

        // 3. Transpile Individual Cells (A1) into values
        expr = expr.replace(/\b[A-Z]\d+\b/g, (match) => {
            let v = cellData[match]?.value;
            if (v === undefined || v === "") return 0;
            return typeof v === "number" ? v : `"${v}"`;
        });

        // 4. Restore Strings
        expr = expr.replace(/__STR(\d+)__/g, (match, i) => strings[i]);

        // 5. Convert Excel Operators to JavaScript Operators
        expr = expr.replace(/<>/g, '!==');
        expr = expr.replace(/<=/g, '__LTE__');
        expr = expr.replace(/>=/g, '__GTE__');
        expr = expr.replace(/=/g, '===');
        expr = expr.replace(/__LTE__/g, '<=');
        expr = expr.replace(/__GTE__/g, '>=');
        expr = expr.replace(/&/g, '+'); // String Concatenation
        expr = expr.replace(/\^/g, '**'); // Exponents

        // 6. Global Function Context Engine
        const ctx = {
            SUM: (...args) => args.flat(Infinity).reduce((a,b)=>a+(Number(b)||0), 0),
            AVERAGE: (...args) => { const arr = args.flat(Infinity).filter(x => typeof x === 'number'); return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0; },
            MIN: (...args) => Math.min(...args.flat(Infinity).map(n=>Number(n)||0)),
            MAX: (...args) => Math.max(...args.flat(Infinity).map(n=>Number(n)||0)),
            COUNT: (...args) => args.flat(Infinity).filter(a=>typeof a === 'number').length,
            COUNTA: (...args) => args.flat(Infinity).filter(a=>a !== '' && a !== null && a !== undefined).length,
            IF: (cond, trueVal, falseVal) => cond ? trueVal : falseVal,
            AND: (...args) => args.flat(Infinity).every(Boolean),
            OR: (...args) => args.flat(Infinity).some(Boolean),
            NOT: (arg) => !arg,
            POWER: (a,b) => Math.pow(a,b),
            SQRT: (a) => Math.sqrt(a),
            ROUND: (a,b) => Number(Math.round(a+'e'+(b||0))+'e-'+(b||0)),
            UPPER: (a) => String(a).toUpperCase(),
            LOWER: (a) => String(a).toLowerCase(),
            LEN: (a) => String(a).length,
            CONCATENATE: (...args) => args.flat(Infinity).join(''),
            TRIM: (a) => String(a).trim(),
            ABS: (a) => Math.abs(a)
        };

        // 7. Execute securely within context scope
        const funcBody = `
            const { SUM, AVERAGE, MIN, MAX, COUNT, COUNTA, IF, AND, OR, NOT, POWER, SQRT, ROUND, UPPER, LOWER, LEN, CONCATENATE, TRIM, ABS } = ctx;
            return ${expr};
        `;
        
        const result = new Function('ctx', funcBody)(ctx);
        return (result === undefined || Number.isNaN(result)) ? "#ERROR!" : result;

    } catch(e) {
        return "#ERROR!";
    }
}

function getRangeValues(range){
    const vals=[];
    const [start,end]=range.split(':');
    
    const sCol=COL_LABELS.indexOf(start[0]);
    const eCol=COL_LABELS.indexOf(end[0]);
    
    const sRow=parseInt(start.substring(1));
    const eRow=parseInt(end.substring(1));

    const rMin = Math.min(sRow, eRow);
    const rMax = Math.max(sRow, eRow);
    const cMin = Math.min(sCol, eCol);
    const cMax = Math.max(sCol, eCol);

    for(let r=rMin; r<=rMax; r++){
        for(let c=cMin; c<=cMax; c++){
            const v = cellData[`${COL_LABELS[c]}${r}`]?.value;
            vals.push(v !== undefined ? v : '');
        }
    }
    return vals;
}

function addLog(msg,type){
    const d=document.createElement('div');
    d.className=type;
    d.textContent="> "+msg;
    logEntries.appendChild(d);
    logEntries.scrollTop = logEntries.scrollHeight;
}

function save(){
    localStorage.setItem('excel_data',JSON.stringify(cellData));
}

function load(){
    const s=localStorage.getItem('excel_data');
    if(s){
        cellData=JSON.parse(s);
        calculateAll();
    }
}

initSpreadsheet();
load();

</script>

</body>
</html>
