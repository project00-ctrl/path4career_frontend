es, the platform is fully responsive and works on mobile phones, tablets, and desktops.",keywords:["mobile","responsive","phone","tablet","device"]},{id:9,question:"What should I do if I cannot log in?",answer:"Try refreshing the page or checking your login details. If the problem persists, contact support.",keywords:["cannot login","login problem","login issue","troubleshooting","login error"]},{id:10,question:"What is the Startup Path feature?",answer:"Startup Path provides a structured roadmap that guides users through the process of building a startup idea.",keywords:["startup path","startup","roadmap","feature"]},{id:11,question:"How does the startup roadmap work?",answer:"The roadmap divides the startup journey into multiple steps, each containing tasks that must be completed before moving forward.",keywords:["startup roadmap","how works","steps","stages"]},{id:12,question:"Why are some steps locked?",answer:"Steps are locked to ensure users complete earlier tasks before progressing to advanced stages.",keywords:["locked steps","unlock","lock","why locked"]},{id:13,question:"How do I unlock the next step?",answer:"Complete all tasks in the current step and the next step will unlock automatically.",keywords:["unlock step","unlock next","how unlock","complete tasks"]},{id:14,question:"Do startup steps have deadlines?",answer:"Yes, some steps include suggested deadlines to help users stay on track.",keywords:["deadlines","deadline","time limit","due date"]},{id:15,question:"How do I complete tasks in the platform?",answer:"Tasks can be completed by selecting or checking the task checkbox.",keywords:["complete tasks","how complete","mark complete","checkbox"]},{id:16,question:"How does the platform track my progress?",answer:"Progress is tracked automatically through completed tasks and visual progress bars.",keywords:["track progress","progress tracking","monitor","statistics"]},{id:17,question:"Can I undo a completed task?",answer:"Yes, tasks can usually be togg
