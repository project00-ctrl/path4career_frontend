<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTF-8</title>
    <link rel="stylesheet" href="../../assets/css/navbar.css">
    <link rel="stylesheet" href="../../assets/css/utf-8refer.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">

</head>

<body>
    <!-- SHARED NAVBAR (injected by navbar.js) -->
    <div id="navbar-root"></div>


    <!-- ====================================================================================================================================== -->
    <aside class="side-content">

        <div class="side-close">
            <button id="side-close">✕</button>
        </div>

        <div class="brand">
            <div class="brand-dot"></div> CHAR_FORGE
        </div>

        <div class="nav-group">
            <span class="label">Reference Sets</span>
            <button class="nav-btn active" onclick="setBlock('basic', this)">BASIC_LATIN (0-127)</button>
            <button class="nav-btn" onclick="setBlock('latin_ext', this)">LATIN_EXTENDED</button>
            <button class="nav-btn" onclick="setBlock('symbols', this)">MATH_SYMBOLS</button>
            <button class="nav-btn" onclick="setBlock('emojis', this)">EMOJI_V1.0</button>
        </div>

        <div class="nav-group">
            <span class="label">Viewport Scale</span>
            <input type="range" id="size" min="20" max="60" value="40" oninput="render()" style="width:100%">
        </div>
    </aside>




    <main>
        <div class="top-bar">
            <h1 id="view-title">BASIC_LATIN / ASCII</h1>
            <input type="text" class="search-field" id="utf-search" placeholder="Search by character or hex..."
                onkeyup="search()">
        </div>

        <div class="glyph-grid" id="grid"></div>
    </main>

    <div id="toast" class="toast">ENTITY_COPIED_TO_CLIPBOARD</div>





    <script>



        // Generator for Basic Latin (32-126)
        const basicLatin = Array.from({ length: 95 }, (_, i) => String.fromCodePoint(i + 32));

        // Generator for Math Operators (8704-8959)
        const mathSymbols = Array.from({ length: 256 }, (_, i) => String.fromCodePoint(i + 8704));

        // Generator for Emojis (Smileys, Animals, Food, etc.)
        const emojiBlocks = [
            { start: 0x1F600, end: 0x1F64F }, // Emoticons
            { start: 0x1F680, end: 0x1F6C5 }, // Transport/Map
            { start: 0x1F300, end: 0x1F320 }, // Weather/Space
            { start: 0x1F330, end: 0x1F35d }, // Plants/Food
            { start: 0x1F400, end: 0x1F43E }, // Animals
            { start: 0x1F3A0, end: 0x1F3C4 }  // Activities
        ];

        const emojiList = [];
        emojiBlocks.forEach(block => {
            for (let i = block.start; i <= block.end; i++) {
                emojiList.push(String.fromCodePoint(i));
            }
        });

        const data = {
            basic: basicLatin,
            latin_ext: ["Ā", "Ă", "Ą", "Ć", "Ĉ", "Ċ", "Ē", "Ĕ", "Ė", "Ę", "ƀ", "Ɓ", "Ƃ", "ƃ", "Ⱡ", "ⱡ", "Ɫ", "Ᵽ"],
            symbols: mathSymbols,
            emojis: emojiList
        };

        let current = 'basic';

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            const list = data[current];
            const size = document.getElementById('size').value;

            list.forEach(char => {
                const card = document.createElement('div');
                card.className = 'glyph-card';

                // Get proper Hex Point for Emojis (can be 5+ digits)
                const codePoint = char.codePointAt(0);
                const hex = codePoint.toString(16).toUpperCase().padStart(4, '0');
                const entity = `&#x${hex};`;

                card.innerHTML = `
                <span class="glyph-char" style="font-size: ${size}px">${char === ' ' ? '␣' : char}</span>
                <div class="glyph-code" style="color:#888">DEC: ${codePoint}</div>
                <div class="glyph-code">${entity}</div>
            `;
                card.onclick = () => copy(entity);
                grid.appendChild(card);
            });
        }

        function setBlock(block, btn) {
            current = block;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('view-title').innerText = btn.innerText;
            render();
        }

        function search() {
            const q = document.getElementById('utf-search').value.toLowerCase();
            document.querySelectorAll('.glyph-card').forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(q) ? 'block' : 'none';
            });
        }

        function copy(text) {
            const el = document.createElement('textarea');
            el.value = text; document.body.appendChild(el);
            el.select(); document.execCommand('copy'); document.body.removeChild(el);
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2000);
        }

        render();




        // Aside sidebar logic
        const aside = document.querySelector(".side-content");
        const sideBtn = document.getElementById("side-close");
        if (sideBtn) {
            sideBtn.addEventListener("click", () => {
                aside.classList.remove("open");
            });
        }
        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") {
                if (aside) aside.classList.remove("open");
            }
        });

    </script>
    <script src="../../assets/js/navbar.js"></script>
</body>

</html>
