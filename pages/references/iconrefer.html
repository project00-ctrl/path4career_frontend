    <script>

                "BOOTSTRAP", "REACT", "MYSQL", "JQUERY", "EXCEL", "XML", "DJANGO", "NUMPY",
                "PANDAS", "NODEJS", "DSA", "TYPESCRIPT", "MANGODB", "GIT", "ANGULAR", "DATASCIENCE"],

                    ],

                    ]

            },

            icons: {
                fa: ["house", "user", "gear", "envelope", "check", "star", "heart", "bell", "camera", "image", "magnifying-glass", "folder", "pen", "link", "comment", "share", "eye", "lock", "key", "print", "laptop", "mobile", "headphones", "video", "clock", "calendar", "map", "bolt", "leaf", "fire", "water", "sun", "moon", "wind", "snowflake", "bicycle", "car", "plane", "ship", "ghost", "robot", "bug", "code", "terminal", "database", "wifi", "battery-full", "shield", "trophy", "gift", "coffee", "flask", "smile", "plus", "minus", "xmark", "bars", "arrow-right", "arrow-left", "circle-info", "earth-americas", "palette", "music", "film", "gamepad", "trash", "anchor", "umbrella", "briefcase", "book", "bookmark", "compass", "globe", "calculator", "microchip", "credit-card", "money-bill", "chart-line", "cart-shopping", "bag-shopping", "medal", "graduation-cap", "flask-vial", "dna", "atom", "brain", "hippo", "crow", "dog", "cat", "fish", "dragon", "spider", "hammer", "wrench", "screwdriver", "truck", "helicopter", "rocket", "paper-plane"],
                mat: ["home", "search", "settings", "done", "favorite", "info", "account_circle", "delete", "visibility", "lock", "face", "schedule", "language", "help", "event", "shopping_cart", "description", "work", "build", "camera_alt", "verified_user", "thumb_up", "print", "explore", "assignment", "dashboard", "room", "book", "grade", "autorenew", "extension", "announcement", "backup", "credit_card", "fingerprint", "loyalty", "receipt", "tab", "today", "update", "accessibility", "alarm", "aspect_ratio", "bug_report", "change_history", "copyright", "dns", "euro_symbol", "gavel", "history"],

            }
        };



        /* ================================================================
           ICON RENDER ENGINE  (exact original logic — zero changes)
        ================================================================ */
        let current = 'fa';

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            const list = current === 'fa' ? DATA.icons.fa : (current === 'mat' ? DATA.icons.mat : DATA.icons.bs);
            const size = document.getElementById('size').value;
            const color = document.getElementById('color').value;

            document.documentElement.style.setProperty('--neon-blue', color);

            list.forEach(name => {
                const card = document.createElement('div');
                card.className = 'forge-card';
                let html = '';

                if (current === 'fa') html = `<i class="fa-solid fa-${name}" style="font-size:${size}px; color:#fff"></i>`;
                else if (current === 'mat') html = `<span class="material-icons" style="font-size:${size}px; color:#fff">${name}</span>`;
                else html = `<i class="bi bi-${name}" style="font-size:${size}px; color:#fff"></i>`;

                card.innerHTML = `${html}<div class="node-id">${name}</div>`;
                card.onclick = () => copy(html);
                grid.appendChild(card);
            });

            /* Run keyword engine every render because grid is rebuilt */
            runKeywordEngine();
        }

        function setLib(lib, btn) {
            current = lib;
            document.querySelectorAll('.lib-opt').forEach(opt => opt.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function search() {
            const q = document.getElementById('icon-search').value.toLowerCase();
            document.querySelectorAll('.forge-card').forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(q) ? 'block' : 'none';
            });
        }

        function copy(text) {
            const el = document.createElement('textarea');
            el.value = text; document.body.appendChild(el);
            el.select(); document.execCommand('copy'); document.body.removeChild(el);
            const n = document.getElementById('notify');
            n.style.display = 'block';
            setTimeout(() => n.style.display = 'none', 2000);
        }

        /* ================================================================
           WIKIPEDIA KEYWORD ENGINE
           - DATA.wikiLinks only — completely separate from DATA.icons
           - TreeWalker scans .node-id text inside #grid
           - Skips text inside <a>, <i>, <span> (icon elements)
           - First occurrence only per keyword (Set tracking)
           - Word-boundary regex, case-insensitive
        ================================================================ */
        function runKeywordEngine() {
            const root = document.getElementById('grid');
            if (!root) return;
            const seen = new Set();

            DATA.wikiLinks.forEach(({ word, link }) => {
                const key = word.toLowerCase();
                if (seen.has(key)) return;

                const safe = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const regex = new RegExp('\\b(' + safe + ')\\b', 'i');

                /* Collect all eligible text nodes first, THEN mutate
                   (mutating during TreeWalker traversal skips nodes) */
                const walker = document.createTreeWalker(
                    root,
                    NodeFilter.SHOW_TEXT,
                    {
                        acceptNode(node) {
                            let p = node.parentElement;
                            while (p && p !== root) {
                                const t = p.tagName;
                                if (t === 'A' || t === 'I' || t === 'SPAN')
                                    return NodeFilter.FILTER_REJECT;
                                p = p.parentElement;
                            }
                            return NodeFilter.FILTER_ACCEPT;
                        }
                    }
                );

                const nodes = [];
                let n;
                while ((n = walker.nextNode())) nodes.push(n);

                for (const textNode of nodes) {
                    if (seen.has(key)) break;
                    const m = regex.exec(textNode.nodeValue);
                    if (!m) continue;

                    const before = document.createTextNode(textNode.nodeValue.slice(0, m.index));
                    const anchor = document.createElement('a');
                    anchor.href = link;
                    anchor.target = '_blank';
                    anchor.rel = 'noopener noreferrer';
                    anchor.className = 'auto-kw';
                    anchor.textContent = m[0];
                    const after = document.createTextNode(textNode.nodeValue.slice(m.index + m[0].length));

                    textNode.parentNode.insertBefore(before, textNode);
                    textNode.parentNode.insertBefore(anchor, textNode);
                    textNode.parentNode.insertBefore(after, textNode);
                    textNode.parentNode.removeChild(textNode);
                    seen.add(key);
                }
            });
        }

        /* Initial render */
        render();

        /* ================================================================
           UI BEHAVIOUR  (exact original logic — zero changes)
        ================================================================ */
        // Aside sidebar logic
        const aside = document.querySelector(".side-content");
        const sideBtn = document.getElementById("side-close");
        if (sideBtn) {
            sideBtn.addEventListener("click", () => {
                aside.classList.remove("open");
            });
        }
        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") {
                if (aside) aside.classList.remove("open");
            }
        });
    </script>
