<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Reset Password | Path4Career</title>
    <link href="css/forgotpassword.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/navbar.css">
    <style>
        .fp-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 80px);
            background: #f4f7f6;
        }
        .fp-box {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
        }
        .fp-box h2 {
            margin-bottom: 20px;
            font-family: 'Comfortaa', sans-serif;
            color: #333;
        }
        .fp-detail {
            margin-bottom: 20px;
            text-align: left;
        }
        .fp-detail label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        .fp-detail input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .fp-detail input:focus {
            border-color: #009688;
            outline: none;
        }
        .fp-btn {
            width: 100%;
            padding: 14px;
            background: #009688;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        .fp-btn:hover {
            background: #00796b;
        }
        .err-msg {
            color: #F44336;
            font-size: 13px;
            margin-top: 5px;
        }
        #resultBox {
            display: none;
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .success-box {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }
    </style>
</head>
<body>
    <div id="navbar-root"></div>

    <div class="fp-container">
        <div class="fp-box">
            <h2>Reset Password</h2>
            <p id="instructionText" style="font-size: 14px; color: #666; margin-bottom: 20px;">
                Please enter your new password below.
            </p>
            
            <div id="resetForm">
                <div class="fp-detail">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" placeholder="••••••••">
                </div>
                <div class="fp-detail">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="••••••••">
                    <p id="reset-err" class="err-msg"></p>
                </div>
                <button class="fp-btn" id="resetBtn">Update Password</button>
            </div>

            <div id="resultBox"></div>

            <p style="margin-top: 25px; font-size: 14px; color: #888;">
                <a href="login.html" style="color: #009688; text-decoration: none; font-weight: 600;">Back to Login</a>
            </p>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        // Get token and email from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const email = urlParams.get('email');

        const resetBtn = document.getElementById('resetBtn');
        const errEl = document.getElementById('reset-err');
        const resultBox = document.getElementById('resultBox');
        const resetForm = document.getElementById('resetForm');
        const instructionText = document.getElementById('instructionText');

        if (!token || !email) {
            resetForm.style.display = 'none';
            instructionText.style.color = '#F44336';
            instructionText.innerHTML = 'Invalid or expired reset link. Please request a new one.';
        }

        resetBtn.onclick = async function() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Simple Validation
            errEl.textContent = "";
            if (newPassword.length < 6) {
                errEl.textContent = "Password must be at least 6 characters long.";
                return;
            }
            if (newPassword !== confirmPassword) {
                errEl.textContent = "Passwords do not match.";
                return;
            }

            try {
                resetBtn.disabled = true;
                resetBtn.textContent = "Updating...";

                const resp = await fetch(API_BASE_URL + "/api/v1/auth/reset-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email: email,
                        token: token,
                        newPassword: newPassword
                    })
                });

                const data = await resp.json();

                if (!resp.ok) {
                    throw new Error(data.message || "Failed to reset password.");
                }

                // Success
                resetForm.style.display = 'none';
                instructionText.style.display = 'none';
                resultBox.classList.add('success-box');
                resultBox.innerHTML = `
                    <p style="font-weight: 600;">Success!</p>
                    <p style="font-size:13px; margin-top:8px;">Your password has been reset successfully. You can now login with your new password.</p>
                `;
                resultBox.style.display = 'block';

            } catch (err) {
                errEl.textContent = err.message;
                resetBtn.disabled = false;
                resetBtn.textContent = "Update Password";
            }
        };
    </script>
    <script src="../../assets/js/navbar.js"></script>
</body>
</html>
