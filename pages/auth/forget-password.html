<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Forgot Password | Path4Career</title>
    <link href="css/forgotpassword.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/navbar.css">
</head>

<body>
    <div id="navbar-root"></div>
    <a href="../../index.html"
        style="position:fixed;top:15px;left:20px;color:#6c5ce7;text-decoration:none;font-size:14px;z-index:100;">← Back
        to Path4Career</a>
    <div class="fp-container">
        <div class="fp-box">
            <h2>Forget Password</h2>
            <p class="fp-text">
                Enter your registered Email address.<br>
                We'll reset your password and show you a temporary one.
            </p>
            <div class="fp-detail">
                <label for="fp-data">Email-ID</label>
                <input type="text" id="fp-data" placeholder="example@gmail.com">
                <p id="fp-email-err" class="err-msg"></p>
            </div>
            <button class="fp-btn" id="fpBtn">Reset Password</button>

            <!-- Success result box (hidden by default) -->
            <div id="resultBox"
                style="display:none; margin-top:16px; padding:16px; background:#e8f5e9; border-radius:8px; text-align:center;">
                <p style="color:#2e7d32; font-weight:600;">Password reset successful!</p>
                <p style="font-size:13px; color:#555;">Your temporary password is:</p>
                <div id="tempPasswordDisplay" style="font-size:20px; font-weight:bold; letter-spacing:2px; color:#1a237e; 
                    background:#f5f5f5; padding:10px; border-radius:6px; margin:8px 0; font-family:monospace;"></div>
                <p style="font-size:12px; color:#888;">Please login with this password and change it immediately.</p>
            </div>

            <p class="fp-back">
                Remember Your Password? <a href="login.html">Back to Login</a>
            </p>
        </div>
    </div>
    <script src="js/config.js"></script>
    <script>
        document.getElementById("fpBtn").onclick = async function () {
            const email = document.getElementById("fp-data").value.trim();
            const errEl = document.getElementById("fp-email-err");
            const resultBox = document.getElementById("resultBox");
            const tempPwdDisplay = document.getElementById("tempPasswordDisplay");

            // Reset UI
            errEl.textContent = "";
            resultBox.style.display = "none";
            document.getElementById("fp-data").style.border = "2px solid #009688";

            // Validate
            if (!email) {
                errEl.textContent = "Please enter your email address";
                document.getElementById("fp-data").style.border = "2px solid #F44336";
                return;
            }

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                errEl.textContent = "Please enter a valid email address";
                document.getElementById("fp-data").style.border = "2px solid #F44336";
                return;
            }

            // Call backend
            try {
                const btn = document.getElementById("fpBtn");
                btn.disabled = true;
                btn.textContent = "Resetting...";

                const response = await fetch(API_BASE_URL + "/api/v1/auth/forgot-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email: email })
                });

                if (!response.ok) {
                    const errBody = await response.json().catch(() => ({ error: "Reset failed" }));
                    throw new Error(errBody.error || "Reset failed");
                }

                const data = await response.json();

                // Show the temporary password
                tempPwdDisplay.textContent = data.temporaryPassword;
                resultBox.style.display = "block";
                document.getElementById("fp-data").value = "";

                btn.textContent = "Reset Password";
                btn.disabled = false;

            } catch (error) {
                errEl.textContent = error.message;
                document.getElementById("fp-data").style.border = "2px solid #F44336";

                const btn = document.getElementById("fpBtn");
                btn.textContent = "Reset Password";
                btn.disabled = false;
            }
        };
    </script>
    <script src="../../assets/js/navbar.js"></script>
</body>

</html>
